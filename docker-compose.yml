services:
  backend:
    build: ./backend
    container_name: movies-backend
    environment:
      - PORT=3000
      - DB_PATH=/data/data.db
    volumes:
      - movies_data:/data
    ports:
      - "3000:3000"

  frontend:
    build: ./frontend
    container_name: movies-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  movies_data:
